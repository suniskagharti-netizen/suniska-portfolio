  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Suniska Gharti</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: white;
      background: #0b111f;
      overflow-x: hidden;
    }

    /* ✨ Same Star Background */
    body::before {
      content: "";
      position: fixed;
      width: 100%;
      height: 100%;
      background-image:
        radial-gradient(white 1px, transparent 1px),
        radial-gradient(white 1px, transparent 1px);
      background-size: 60px 60px, 100px 100px;
      background-position: 0 0, 30px 30px;
      opacity: 0.3;
      animation: twinkle 6s infinite linear;
      z-index: -1;
    }

    @keyframes twinkle {
      0% { opacity: 0.2; }
      50% { opacity: 0.4; }
      100% { opacity: 0.2; }
    }

    nav {
      background-color: rgba(255,255,255,0.05);
      padding: 15px;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    nav a {
      color: #ddd;
      text-decoration: none;
      margin: 15px;
      font-size: 18px;
    }

    nav a:hover {
      color: #f7eac2;
    }

    .Vervein {
      text-align: center;
      padding: 50px 20px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .Vervein h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    .Vervein p {
      font-size: 18px;
      color: #ccc;
    }

    .contact-form {
      width: 60%;
      margin: 50px auto;
      padding: 30px;
      background: rgba(255,255,255,0.08);
      border-radius: 15px;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.4);
      flex: 1;
    }

    .contact-form table {
      width: 100%;
    }

    .contact-form td {
      padding: 10px;
    }

    .contact-form label {
      font-size: 16px;
      font-weight: bold;
      color: #eee;
    }

    .contact-form input,
    .contact-form textarea {
      width: 100%;
      padding: 12px;
      margin-top: 5px;
      margin-bottom: 15px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      background: rgba(255,255,255,0.15);
      color: white;
    }

    .contact-form textarea {
      resize: vertical;
      height: 150px;
    }

    .contact-form button {
      background-color: #f7eac2;
      color: #111827;
      padding: 12px 20px;
      border: none;
      border-radius: 6px;
      font-size: 18px;
      cursor: pointer;
      width: 100%;
      transition: 0.3s;
    }

    .contact-form button:hover {
      background-color: #fff3d1;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: rgba(255,255,255,0.05);
      border-top: 1px solid rgba(255,255,255,0.1);
      margin-top: auto;
    }

    footer p {
      color: #bbb;
      font-size: 14px;
    }

    /* 📱 Responsive */
    @media (max-width: 768px) {
      .contact-form {
        width: 90%;
      }

      .Vervein h1 {
        font-size: 28px;
      }
    }
  </style>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="about.html">About</a>
  <a href="skills.html">Skills</a>
  <a href="hobbies.html">Hobbies</a>
  <a href="contact.html">Contact</a>
   
</nav>

<section class="Vervein">
  <h1>Contact Suniska Gharti</h1>
  <p>Feel free to reach out anytime ✨</p>
</section>

<section class="contact-form">
  <form action="#">
    <table>
      <tr>
        <td><label for="name">Your Name</label></td>
        <td><input type="text" id="name" name="name" placeholder="Enter your name" required></td>
      </tr>
      <tr>
        <td><label for="email">Your Email</label></td>
        <td><input type="email" id="email" name="email" placeholder="Enter your email" required></td>
      </tr>
      <tr>
        <td><label for="message">Your Message</label></td>
        <td><textarea id="message" name="message" placeholder="Enter your message" required></textarea></td>
      </tr>
      <tr>
        <td colspan="2" style="text-align: center;">
          <button type="submit">Send Message</button>
        </td>
      </tr>
    </table>
  </form>
</section>

<footer>
  <p>© 2026 Suniska Gharti | Portfolio</p>
</footer>

</body>
</html>
