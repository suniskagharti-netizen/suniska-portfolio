<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio | Suniska Gharti</title>

<style>
body {
font-family: Arial, sans-serif;
margin: 0;
background: #f4f4f4;
}

/* HEADER */
header {
background: #080808;
color: white;
text-align: center;
padding: 25px;
}

/* MAIN LAYOUT */
.container {
display: flex;
justify-content: space-between;
padding: 50px;
}

/* LEFT SIDE BOX */
.left-box {
width: 60%;
background: white;
padding: 30px;
border-radius: 15px;
box-shadow: 0 5px 15px rgba(231, 104, 193, 0.1);
}

/* GRID INSIDE LEFT BOX */
.grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 20px;
}

/* SMALL BOXES */
.card {
background: #1b191b;
color: white;
padding: 30px;
text-align: center;
border-radius: 10px;
cursor: pointer;
transition: 0.3s;
}

.card:hover {
background: #1f2937;
transform: scale(1.05);
}

/* RIGHT SIDE PROFILE */
.right-box {
width: 35%;
display: flex;
justify-content: center;
align-items: center;
}

/* OVAL IMAGE */
.profile {
width: 250px;
height: 320px;
border-radius: 50% / 40%;
object-fit: cover;
border: 5px solid #111827;
}

/* FOOTER */
footer {
text-align: center;
padding: 15px;
background: #111827;
color: white;
}
</style>

</head>

<body>

<header>
<h1>Suniska Gharti</h1>
<p>Student | Future Developer</p>
</header>

<div class="container">

<!-- LEFT SIDE -->
<div class="left-box">
<h2>Explore</h2>

<div class="grid">

<div class="card" onclick="openPage('about.html')">
About Me
</div>

<div class="card" onclick="openPage('hobbies.html')">
Hobbies
</div>

<div class="card" onclick="openPage('skills.html')">
Skills
</div>

<div class="card" onclick="openPage('contact.html')">
Contact
</div>

</div>
</div>

<!-- RIGHT SIDE -->
<div class="right-box">
<img src="pic.jpg" alt="Profile Photo" class="profile">
</div>

</div>

<footer>
<p>© 2026 Suniska Gharti</p>
</footer>

<script>
function openPage(page) {
window.location.href = page;
}
</script>

</body>
</html>
